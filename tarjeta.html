<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi tarjeta virtual - El Patrón del Mal</title>
  <style>
    :root{
      --bg:#000814;
      --card:#001233;
      --gold:#facc15;
      --gold-soft:#fde68a;
      --text:#fff8dc;
      --muted:#94a3b8;
      --line:#334155;
      --ok:#16a34a;
      --bad:#dc2626;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(250,204,21,0.10), transparent 25%),
        linear-gradient(180deg, #000814 0%, #00122b 100%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:22px;
    }

    .wrap{
      width:100%;
      max-width:900px;
    }

    .card{
      background:rgba(0,18,51,0.98);
      border:1px solid var(--gold);
      border-radius:28px;
      padding:26px;
      box-shadow:
        0 0 28px rgba(250,204,21,0.12),
        0 10px 40px rgba(0,0,0,0.45);
      overflow:hidden;
      position:relative;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-120px auto auto -120px;
      width:240px;
      height:240px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(250,204,21,0.18), transparent 70%);
      pointer-events:none;
    }

    .top{
      display:flex;
      align-items:center;
      gap:18px;
      margin-bottom:18px;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
    }

    .logo{
      width:92px;
      height:92px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid var(--gold);
      background:#fff;
      box-shadow:0 0 16px rgba(250,204,21,0.28);
      flex-shrink:0;
    }

    .title-box{
      flex:1;
      min-width:220px;
    }

    .title{
      margin:0;
      font-size:34px;
      line-height:1.05;
      color:var(--gold);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1px;
      text-shadow:0 0 10px rgba(250,204,21,0.30);
    }

    .subtitle{
      margin:8px 0 0;
      color:#dbeafe;
      font-size:16px;
    }

    .chip{
      display:inline-block;
      margin-top:10px;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid rgba(250,204,21,0.35);
      background:rgba(0,0,0,0.25);
      color:var(--gold-soft);
      font-weight:700;
      font-size:13px;
    }

    .status{
      margin-top:18px;
      padding:14px 16px;
      border-radius:16px;
      font-size:14px;
      display:none;
      line-height:1.45;
      position:relative;
      z-index:1;
    }

    .status.ok{
      display:block;
      background:#052e16;
      border:1px solid var(--ok);
      color:#bbf7d0;
    }

    .status.err{
      display:block;
      background:#450a0a;
      border:1px solid var(--bad);
      color:#fecaca;
    }

    .loading{
      text-align:center;
      padding:16px;
      color:#dbeafe;
      font-size:15px;
      position:relative;
      z-index:1;
    }

    .content{
      display:none;
      position:relative;
      z-index:1;
    }

    .info{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .info-card{
      background:rgba(0,0,0,0.26);
      border:1px solid #1e293b;
      border-radius:18px;
      padding:14px;
    }

    .info-label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:8px;
    }

    .info-value{
      color:#fff;
      font-size:18px;
      font-weight:800;
      word-break:break-word;
    }

    .progress-box{
      margin-top:22px;
      background:rgba(0,0,0,0.26);
      border:1px solid #1e293b;
      border-radius:22px;
      padding:18px;
    }

    .progress-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .progress-head h2{
      margin:0;
      font-size:20px;
      color:var(--gold-soft);
    }

    .big-counter{
      font-size:18px;
      font-weight:900;
      color:var(--gold);
    }

    .bar{
      width:100%;
      height:14px;
      background:#0f172a;
      border:1px solid #1e293b;
      border-radius:999px;
      overflow:hidden;
    }

    .bar-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, #facc15, #fde68a);
      border-radius:999px;
      transition:width .35s ease;
      box-shadow:0 0 12px rgba(250,204,21,0.35);
    }

    .stamps{
      margin-top:20px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
    }

    .stamp{
      aspect-ratio:1/1;
      border-radius:50%;
      border:2px solid rgba(250,204,21,0.35);
      background:
        radial-gradient(circle at top, rgba(250,204,21,0.12), rgba(0,0,0,0.18)),
        #020617;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .stamp:hover{
      transform:translateY(-2px);
    }

    .stamp img{
      width:62%;
      height:62%;
      object-fit:contain;
      border-radius:50%;
      background:#fff;
      padding:4px;
      transition:filter .2s ease, opacity .2s ease, transform .2s ease;
    }

    .stamp.empty img{
      opacity:.20;
      filter:grayscale(100%);
      transform:scale(.92);
    }

    .stamp.filled{
      border-color:var(--gold);
      box-shadow:0 0 18px rgba(250,204,21,0.22);
    }

    .stamp.filled img{
      opacity:1;
      filter:none;
      transform:scale(1);
    }

    .stamp-number{
      position:absolute;
      bottom:6px;
      right:8px;
      font-size:11px;
      font-weight:900;
      color:#e5e7eb;
      background:rgba(0,0,0,0.58);
      border-radius:999px;
      padding:2px 6px;
      border:1px solid rgba(255,255,255,0.10);
    }

    .reward-box{
      margin-top:20px;
      border-radius:18px;
      padding:16px;
      font-weight:700;
      font-size:15px;
      background:rgba(0,0,0,0.24);
      border:1px solid #1e293b;
      color:#cbd5e1;
      line-height:1.45;
    }

    .levels{
      margin-top:20px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .level-card{
      background:rgba(0,0,0,0.26);
      border:1px solid #1e293b;
      border-radius:18px;
      padding:14px;
    }

    .level-card.unlocked{
      border-color:rgba(250,204,21,0.55);
      box-shadow:0 0 16px rgba(250,204,21,0.12);
      background:linear-gradient(180deg, rgba(250,204,21,0.10), rgba(0,0,0,0.18));
    }

    .level-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .level-title{
      color:var(--gold-soft);
      font-size:16px;
      font-weight:900;
    }

    .level-pill{
      font-size:12px;
      font-weight:900;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid #334155;
      background:#0f172a;
      color:#cbd5e1;
    }

    .level-card.unlocked .level-pill{
      border-color:rgba(250,204,21,0.45);
      color:#fff3bf;
      background:rgba(250,204,21,0.12);
    }

    .level-desc{
      color:#dbeafe;
      font-size:14px;
      line-height:1.4;
    }

    .actions{
      margin-top:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      flex:1;
      min-width:160px;
      padding:14px 16px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
    }

    .btn-primary{
      background:var(--gold);
      color:#111827;
    }

    .btn-secondary{
      background:#0f172a;
      color:#f8fafc;
      border:1px solid #334155;
    }

    .foot{
      margin-top:16px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
    }

    @media (max-width:700px){
      .title{ font-size:28px; }
      .info{ grid-template-columns:1fr; }
      .levels{ grid-template-columns:1fr; }
      .stamps{ grid-template-columns:repeat(5,1fr); gap:10px; }
    }

    @media (max-width:520px){
      .card{ padding:18px; border-radius:22px; }
      .title{ font-size:22px; }
      .subtitle{ font-size:14px; }
      .stamps{ grid-template-columns:repeat(5,1fr); gap:8px; }
      .stamp-number{ font-size:10px; right:5px; bottom:5px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <img src="LOGO.jpg" alt="Logo" class="logo">
        <div class="title-box">
          <h1 class="title">Mi Tarjeta Virtual</h1>
          <p class="subtitle">Sella tus compras y gana premios en El Patrón del Mal</p>
          <div class="chip" id="chipText">Cargando sesión...</div>
        </div>
      </div>

      <div id="statusOk" class="status ok"></div>
      <div id="statusErr" class="status err"></div>

      <div id="loading" class="loading">Consultando tu tarjeta...</div>

      <div id="content" class="content">
        <div class="info">
          <div class="info-card">
            <div class="info-label">Cliente</div>
            <div class="info-value" id="clienteNombre">-</div>
          </div>
          <div class="info-card">
            <div class="info-label">Celular</div>
            <div class="info-value" id="clienteCelular">-</div>
          </div>
        </div>

        <div class="progress-box">
          <div class="progress-head">
            <h2>Sellos acumulados</h2>
            <div class="big-counter" id="bigCounter">0 / 20</div>
          </div>

          <div class="bar">
            <div class="bar-fill" id="barFill"></div>
          </div>

          <div class="stamps" id="stampsGrid"></div>

          <div class="reward-box" id="rewardBox">
            Sigue acumulando sellos para reclamar tus premios.
          </div>

          <div class="levels" id="levelsBox"></div>
        </div>

        <div class="actions">
          <button class="btn btn-secondary" id="btnLogout">Cerrar sesión</button>
          <button class="btn btn-primary" id="btnLogin">Ir a login</button>
        </div>

        <div class="foot">
          Presenta esta tarjeta virtual en el local para validar tus sellos y premios.
        </div>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "pdm_customer_token";

    const REWARD_LEVELS = [
      { stamps: 5,  title: "Primer premio",  reward: "1 gaseosa gratis" },
      { stamps: 10, title: "Segundo premio", reward: "1 salchimix gratis" },
      { stamps: 15, title: "Tercer premio",  reward: "1 burger clásica gratis" },
      { stamps: 20, title: "Gran premio",    reward: "1 plato de alitas gratis" }
    ];

    const statusOk = document.getElementById("statusOk");
    const statusErr = document.getElementById("statusErr");
    const loading = document.getElementById("loading");
    const content = document.getElementById("content");
    const chipText = document.getElementById("chipText");

    const clienteNombre = document.getElementById("clienteNombre");
    const clienteCelular = document.getElementById("clienteCelular");
    const bigCounter = document.getElementById("bigCounter");
    const barFill = document.getElementById("barFill");
    const stampsGrid = document.getElementById("stampsGrid");
    const rewardBox = document.getElementById("rewardBox");
    const levelsBox = document.getElementById("levelsBox");
    const btnLogout = document.getElementById("btnLogout");
    const btnLogin = document.getElementById("btnLogin");

    function showOk(text) {
      statusErr.style.display = "none";
      statusOk.style.display = "block";
      statusOk.textContent = text;
    }

    function showErr(text) {
      statusOk.style.display = "none";
      statusErr.style.display = "block";
      statusErr.textContent = text;
    }

    function renderStamps(actuales, meta) {
      stampsGrid.innerHTML = "";
      const total = Math.max(20, Number(meta) || 20);
      const current = Math.max(0, Number(actuales) || 0);

      for (let i = 1; i <= total; i++) {
        const filled = i <= current;

        const stamp = document.createElement("div");
        stamp.className = "stamp " + (filled ? "filled" : "empty");

        const img = document.createElement("img");
        img.src = "LOGO.jpg";
        img.alt = "Sello " + i;

        const number = document.createElement("div");
        number.className = "stamp-number";
        number.textContent = i;

        stamp.appendChild(img);
        stamp.appendChild(number);
        stampsGrid.appendChild(stamp);
      }
    }

    function renderLevels(actuales) {
      levelsBox.innerHTML = "";

      REWARD_LEVELS.forEach(level => {
        const unlocked = actuales >= level.stamps;

        const card = document.createElement("div");
        card.className = "level-card" + (unlocked ? " unlocked" : "");

        const top = document.createElement("div");
        top.className = "level-top";

        const title = document.createElement("div");
        title.className = "level-title";
        title.textContent = `${level.stamps} sellos`;

        const pill = document.createElement("div");
        pill.className = "level-pill";
        pill.textContent = unlocked ? "Desbloqueado" : "Pendiente";

        const desc = document.createElement("div");
        desc.className = "level-desc";
        desc.innerHTML = `<b>${level.title}:</b> ${level.reward}`;

        top.appendChild(title);
        top.appendChild(pill);

        card.appendChild(top);
        card.appendChild(desc);

        levelsBox.appendChild(card);
      });
    }

    function getNextReward(actuales) {
      return REWARD_LEVELS.find(level => actuales < level.stamps) || null;
    }

    function buildRewardMessage(actuales, premioPendiente) {
      if (premioPendiente) {
        return "🎉 Tienes un premio pendiente por reclamar en el local.";
      }

      const nextReward = getNextReward(actuales);

      if (!nextReward) {
        return "🔥 ¡Ya completaste toda la tarjeta! Consulta en el local para reclamar tu premio mayor.";
      }

      const missing = nextReward.stamps - actuales;
      return `Te faltan ${missing} sello(s) para llegar a ${nextReward.stamps} y ganar ${nextReward.reward}.`;
    }

    async function loadCard() {
      const token = localStorage.getItem(TOKEN_KEY);

      if (!token) {
        showErr("No has iniciado sesión.");
        chipText.textContent = "Sesión requerida";
        loading.style.display = "none";
        content.style.display = "block";
        renderStamps(0, 20);
        renderLevels(0);
        rewardBox.textContent = "Inicia sesión para ver tus sellos.";
        return;
      }

      try {
        const res = await fetch("/api/get-card", {
          headers: {
            Authorization: "Bearer " + token
          }
        });

        const data = await res.json();

        if (!res.ok) {
          localStorage.removeItem(TOKEN_KEY);
          showErr(data.error + (data.detail ? ": " + data.detail : ""));
          chipText.textContent = "Sesión inválida";
          loading.style.display = "none";
          content.style.display = "block";
          renderStamps(0, 20);
          renderLevels(0);
          rewardBox.textContent = "Vuelve a iniciar sesión.";
          return;
        }

        const customer = data.customer || {};
        const card = data.card || {};

        const actuales = Number(card.sellos_actuales || 0);
        const meta = Math.max(20, Number(card.meta_sellos || 20));
        const premioPendiente = !!card.premio_pendiente;
        const progress = Math.min(100, (actuales / meta) * 100);

        clienteNombre.textContent = customer.nombre || "-";
        clienteCelular.textContent = customer.celular || "-";
        bigCounter.textContent = actuales + " / " + meta;
        barFill.style.width = progress + "%";
        chipText.textContent = "Sesión iniciada";

        renderStamps(actuales, meta);
        renderLevels(actuales);
        rewardBox.textContent = buildRewardMessage(actuales, premioPendiente);

        if (premioPendiente) {
          showOk("Tarjeta cargada correctamente. Tienes un premio pendiente.");
        } else {
          showOk("Tarjeta cargada correctamente.");
        }

        loading.style.display = "none";
        content.style.display = "block";
      } catch (err) {
        showErr("No se pudo consultar la tarjeta: " + (err.message || String(err)));
        chipText.textContent = "Error";
        loading.style.display = "none";
        content.style.display = "block";
        renderStamps(0, 20);
        renderLevels(0);
        rewardBox.textContent = "Vuelve a intentar en unos segundos.";
      }
    }

    btnLogout.addEventListener("click", () => {
      localStorage.removeItem(TOKEN_KEY);
      window.location.href = "/login.html";
    });

    btnLogin.addEventListener("click", () => {
      window.location.href = "/login.html";
    });

    renderStamps(0, 20);
    renderLevels(0);
    loadCard();
  </script>
</body>
</html>
