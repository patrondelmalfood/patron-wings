<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sellos - El Patrón del Mal</title>
  <style>
    :root{
      --bg:#000814;
      --card:#001233;
      --gold:#facc15;
      --gold-soft:#fde68a;
      --text:#fff8dc;
      --muted:#94a3b8;
      --line:#334155;
      --ok:#16a34a;
      --bad:#dc2626;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(250,204,21,0.10), transparent 25%),
        linear-gradient(180deg, #000814 0%, #00122b 100%);
      color:var(--text);
      min-height:100vh;
      padding:22px;
    }

    .wrap{
      width:100%;
      max-width:780px;
      margin:0 auto;
    }

    .card{
      background:rgba(0,18,51,0.98);
      border:1px solid var(--gold);
      border-radius:28px;
      padding:26px;
      box-shadow:
        0 0 28px rgba(250,204,21,0.12),
        0 10px 40px rgba(0,0,0,0.45);
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
    }

    .logo{
      width:88px;
      height:88px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid var(--gold);
      background:#fff;
      box-shadow:0 0 16px rgba(250,204,21,0.28);
      flex-shrink:0;
    }

    .title{
      margin:0;
      font-size:32px;
      color:var(--gold);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .subtitle{
      margin:6px 0 0;
      color:#dbeafe;
      font-size:15px;
    }

    .search-box{
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    input{
      flex:1;
      min-width:200px;
      width:100%;
      box-sizing:border-box;
      padding:14px;
      border-radius:12px;
      border:1px solid #334155;
      background:#000;
      color:#fff;
      font-size:16px;
      outline:none;
    }

    input:focus{
      border-color:#facc15;
      box-shadow:0 0 0 2px rgba(250, 204, 21, 0.15);
    }

    button{
      padding:14px 18px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
    }

    .btn-primary{
      background:var(--gold);
      color:#111827;
    }

    .btn-secondary{
      background:#0f172a;
      color:#f8fafc;
      border:1px solid #334155;
    }

    .btn-green{
      background:#22c55e;
      color:#052e16;
    }

    .btn-red{
      background:#ef4444;
      color:#fff;
    }

    .msg{
      margin-top:16px;
      padding:12px;
      border-radius:12px;
      display:none;
      font-size:14px;
      line-height:1.4;
      word-break:break-word;
    }

    .ok{
      background:#052e16;
      color:#bbf7d0;
      border:1px solid #16a34a;
    }

    .err{
      background:#450a0a;
      color:#fecaca;
      border:1px solid #dc2626;
    }

    .result{
      margin-top:20px;
      display:none;
      background:rgba(0,0,0,0.24);
      border:1px solid #1e293b;
      border-radius:22px;
      padding:18px;
    }

    .info{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .info-card{
      background:rgba(0,0,0,0.26);
      border:1px solid #1e293b;
      border-radius:18px;
      padding:14px;
    }

    .info-label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:8px;
    }

    .info-value{
      color:#fff;
      font-size:18px;
      font-weight:800;
      word-break:break-word;
    }

    .actions{
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .stamp-note{
      margin-top:14px;
      color:#cbd5e1;
      font-size:14px;
      line-height:1.4;
    }

    .mini{
      margin-top:16px;
      text-align:center;
      color:#94a3b8;
      font-size:13px;
    }

    .lock-screen{
      max-width:430px;
      margin:80px auto 0;
    }

    .lock-screen .card{
      text-align:center;
    }

    .lock-title{
      margin:0 0 8px;
      font-size:30px;
      color:var(--gold);
      font-weight:900;
      text-transform:uppercase;
    }

    .lock-subtitle{
      margin:0 0 18px;
      color:#dbeafe;
      font-size:15px;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:700px){
      .title{ font-size:26px; }
      .info{ grid-template-columns:1fr; }
      .search-box{ flex-direction:column; }
      .search-box button{ width:100%; }
      .actions button{ width:100%; }
      .top{ align-items:flex-start; }
    }
  </style>
</head>
<body>
  <div id="lockScreen" class="wrap lock-screen">
    <div class="card">
      <img src="LOGO.jpg" alt="Logo" class="logo">
      <h1 class="lock-title">Acceso Admin</h1>
      <p class="lock-subtitle">Ingresa la clave para abrir el panel de sellos.</p>

      <input
        id="adminPassword"
        type="password"
        placeholder="Ingresa la clave"
        autocomplete="current-password"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
      >

      <button class="btn-primary" id="btnUnlock" style="width:100%; margin-top:14px;">Entrar</button>

      <div id="lockMsgOk" class="msg ok"></div>
      <div id="lockMsgErr" class="msg err"></div>
    </div>
  </div>

  <div id="adminPanel" class="wrap hidden">
    <div class="card">
      <div class="top">
        <div class="top-left">
          <img src="LOGO.jpg" alt="Logo" class="logo">
          <div>
            <h1 class="title">Admin de Sellos</h1>
            <p class="subtitle">Busca clientes por celular y suma sellos fácilmente</p>
          </div>
        </div>
        <button class="btn-red" id="btnLogout">Salir</button>
      </div>

      <div class="search-box">
        <input
          id="buscarCelular"
          type="text"
          placeholder="Escribe el celular del cliente"
          inputmode="numeric"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
        >
        <button class="btn-primary" id="btnBuscar">Buscar cliente</button>
      </div>

      <div id="msgOk" class="msg ok"></div>
      <div id="msgErr" class="msg err"></div>

      <div id="result" class="result">
        <div class="info">
          <div class="info-card">
            <div class="info-label">Cliente</div>
            <div class="info-value" id="clienteNombre">-</div>
          </div>
          <div class="info-card">
            <div class="info-label">Celular</div>
            <div class="info-value" id="clienteCelular">-</div>
          </div>
          <div class="info-card">
            <div class="info-label">Sellos actuales</div>
            <div class="info-value" id="clienteSellos">0 / 20</div>
          </div>
        </div>

        <div class="actions">
          <button class="btn-green" id="btnAddStamp">+1 sello</button>
          <button class="btn-secondary" id="btnRefresh">Actualizar</button>
          <button class="btn-red" id="btnClear">Limpiar</button>
        </div>

        <div class="stamp-note" id="stampNote">
          Busca un cliente para comenzar.
        </div>
      </div>

      <div class="mini">
        Panel simple para moza o administrador. Un toque suma 1 sello al cliente encontrado.
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = "Bela1997";
    const ADMIN_SESSION_KEY = "pdm_admin_sellos_ok";

    const lockScreen = document.getElementById("lockScreen");
    const adminPanel = document.getElementById("adminPanel");
    const adminPassword = document.getElementById("adminPassword");
    const btnUnlock = document.getElementById("btnUnlock");
    const btnLogout = document.getElementById("btnLogout");
    const lockMsgOk = document.getElementById("lockMsgOk");
    const lockMsgErr = document.getElementById("lockMsgErr");

    const buscarCelular = document.getElementById("buscarCelular");
    const btnBuscar = document.getElementById("btnBuscar");
    const btnAddStamp = document.getElementById("btnAddStamp");
    const btnRefresh = document.getElementById("btnRefresh");
    const btnClear = document.getElementById("btnClear");

    const msgOk = document.getElementById("msgOk");
    const msgErr = document.getElementById("msgErr");

    const result = document.getElementById("result");
    const clienteNombre = document.getElementById("clienteNombre");
    const clienteCelular = document.getElementById("clienteCelular");
    const clienteSellos = document.getElementById("clienteSellos");
    const stampNote = document.getElementById("stampNote");

    let currentCustomer = null;
    let currentCard = null;

    function showLockOk(text) {
      lockMsgErr.style.display = "none";
      lockMsgOk.style.display = "block";
      lockMsgOk.textContent = text;
    }

    function showLockErr(text) {
      lockMsgOk.style.display = "none";
      lockMsgErr.style.display = "block";
      lockMsgErr.textContent = text;
    }

    function hideLockMessages() {
      lockMsgOk.style.display = "none";
      lockMsgErr.style.display = "none";
    }

    function showOk(text) {
      msgErr.style.display = "none";
      msgOk.style.display = "block";
      msgOk.textContent = text;
    }

    function showErr(text) {
      msgOk.style.display = "none";
      msgErr.style.display = "block";
      msgErr.textContent = text;
    }

    function hideMessages() {
      msgOk.style.display = "none";
      msgErr.style.display = "none";
    }

    function openPanel() {
      lockScreen.classList.add("hidden");
      adminPanel.classList.remove("hidden");
      buscarCelular.focus();
    }

    function closePanel() {
      localStorage.removeItem(ADMIN_SESSION_KEY);
      adminPanel.classList.add("hidden");
      lockScreen.classList.remove("hidden");
      adminPassword.value = "";
      hideLockMessages();
      adminPassword.focus();
    }

    function tryAutoLogin() {
      const ok = localStorage.getItem(ADMIN_SESSION_KEY);
      if (ok === "1") {
        openPanel();
      } else {
        closePanel();
      }
    }

    function unlockPanel() {
      const pass = adminPassword.value.trim();
      hideLockMessages();

      if (!pass) {
        showLockErr("Escribe la clave.");
        return;
      }

      if (pass !== ADMIN_PASSWORD) {
        showLockErr("Clave incorrecta.");
        return;
      }

      localStorage.setItem(ADMIN_SESSION_KEY, "1");
      showLockOk("Clave correcta. Abriendo panel...");
      setTimeout(() => {
        openPanel();
      }, 400);
    }

    function renderCustomer(data) {
      currentCustomer = data.customer || null;
      currentCard = data.card || null;

      const actuales = Number(currentCard?.sellos_actuales || 0);
      const meta = Math.max(20, Number(currentCard?.meta_sellos || 20));

      clienteNombre.textContent = currentCustomer?.nombre || "-";
      clienteCelular.textContent = currentCustomer?.celular || "-";
      clienteSellos.textContent = `${actuales} / ${meta}`;

      if ([5, 10, 15, 20].includes(actuales)) {
        stampNote.textContent = `Cliente llegó a ${actuales} sellos. Revisar premio disponible.`;
      } else {
        stampNote.textContent = "Cliente cargado correctamente.";
      }

      result.style.display = "block";
    }

    function clearView() {
      currentCustomer = null;
      currentCard = null;
      buscarCelular.value = "";
      clienteNombre.textContent = "-";
      clienteCelular.textContent = "-";
      clienteSellos.textContent = "0 / 20";
      stampNote.textContent = "Busca un cliente para comenzar.";
      result.style.display = "none";
      hideMessages();
    }

    async function searchCustomer() {
      const cel = buscarCelular.value.replace(/\D/g, "").trim();

      hideMessages();

      if (!cel) {
        showErr("Escribe un número de celular.");
        return;
      }

      try {
        const res = await fetch("/api/admin-find-customer?celular=" + encodeURIComponent(cel));
        const data = await res.json();

        if (!res.ok) {
          result.style.display = "none";
          showErr(data.error + (data.detail ? ": " + data.detail : ""));
          return;
        }

        renderCustomer(data);
        showOk("Cliente encontrado correctamente.");
      } catch (err) {
        result.style.display = "none";
        showErr("Error inesperado: " + (err.message || String(err)));
      }
    }

    async function addStamp() {
      hideMessages();

      if (!currentCustomer || !currentCustomer.celular) {
        showErr("Primero busca un cliente.");
        return;
      }

      btnAddStamp.disabled = true;
      btnAddStamp.textContent = "Sumando...";

      try {
        const res = await fetch("/api/admin-add-stamp", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            celular: currentCustomer.celular
          })
        });

        const data = await res.json();

        if (!res.ok) {
          showErr(data.error + (data.detail ? ": " + data.detail : ""));
          return;
        }

        renderCustomer(data);
        const stamps = Number(data.card?.sellos_actuales || 0);

        if ([5, 10, 15, 20].includes(stamps)) {
          showOk(`Se agregó 1 sello. Cliente llegó a ${stamps} sellos.`);
        } else {
          showOk("Se agregó 1 sello correctamente.");
        }
      } catch (err) {
        showErr("Error inesperado: " + (err.message || String(err)));
      } finally {
        btnAddStamp.disabled = false;
        btnAddStamp.textContent = "+1 sello";
      }
    }

    btnUnlock.addEventListener("click", unlockPanel);
    btnLogout.addEventListener("click", closePanel);

    adminPassword.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        unlockPanel();
      }
    });

    btnBuscar.addEventListener("click", searchCustomer);
    btnAddStamp.addEventListener("click", addStamp);
    btnRefresh.addEventListener("click", searchCustomer);
    btnClear.addEventListener("click", clearView);

    buscarCelular.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        searchCustomer();
      }
    });

    tryAutoLogin();
  </script>
</body>
</html>
