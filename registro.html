<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de cliente - El Patrón del Mal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000814;
      color: #fff8dc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #001233;
      border: 1px solid #facc15;
      border-radius: 22px;
      padding: 26px;
      box-shadow: 0 0 25px rgba(250, 204, 21, 0.18);
      box-sizing: border-box;
    }

    .brand {
      text-align: center;
      margin-bottom: 22px;
    }

    .brand-logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #facc15;
      margin-bottom: 12px;
      background: #000;
      box-shadow: 0 0 12px rgba(250, 204, 21, 0.35);
    }

    @keyframes goldGlow {
      0% {
        color: #facc15;
        text-shadow: 0 0 4px #facc15, 0 0 8px rgba(250, 204, 21, 0.45);
      }
      50% {
        color: #ffe58a;
        text-shadow:
          0 0 6px #ffe58a,
          0 0 14px rgba(250, 204, 21, 0.7),
          0 0 22px rgba(250, 204, 21, 0.45);
      }
      100% {
        color: #facc15;
        text-shadow: 0 0 4px #facc15, 0 0 8px rgba(250, 204, 21, 0.45);
      }
    }

    .brand h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
      color: #facc15;
      animation: goldGlow 2.2s ease-in-out infinite;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .brand p {
      margin: 0;
      color: #d1d5db;
      font-size: 15px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: #fde68a;
      font-weight: 700;
      font-size: 15px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #000;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #facc15;
      box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.15);
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      border: 0;
      border-radius: 14px;
      background: #facc15;
      color: #111827;
      font-weight: 900;
      font-size: 17px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    .ok {
      background: #052e16;
      color: #bbf7d0;
      border: 1px solid #16a34a;
    }

    .err {
      background: #450a0a;
      color: #fecaca;
      border: 1px solid #dc2626;
    }

    .mini {
      margin-top: 14px;
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="LOGO.jpg" alt="El Patrón del Mal" class="brand-logo">
      <h1>EL PATRÓN DEL MAL</h1>
      <p>Tarjeta virtual de sellos y premios</p>
    </div>

    <label for="nombre">Nombre</label>
    <input id="nombre" type="text" placeholder="Tu nombre">

    <label for="celular">Celular</label>
    <input id="celular" type="text" placeholder="Tu número">

    <label for="correo">Correo</label>
    <input id="correo" type="email" placeholder="Tu correo">

    <button id="btnGuardar">Registrarme</button>

    <div id="msgOk" class="msg ok"></div>
    <div id="msgErr" class="msg err"></div>

    <div class="mini">
      Al registrarte podrás acumular sellos y acceder a premios.
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://defdwzzewzfjusoezwkn.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlZmR3enpld3pmanVzZW96d2tuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3ODE4NTMsImV4cCI6MjA4OTM1Nzg1M30.WgVc6PT9rwAEk4yn2i63GyOUl0CTZE6J-7r_2mpumAs";

    const nombre = document.getElementById("nombre");
    const celular = document.getElementById("celular");
    const correo = document.getElementById("correo");
    const btnGuardar = document.getElementById("btnGuardar");
    const msgOk = document.getElementById("msgOk");
    const msgErr = document.getElementById("msgErr");

    const BASE_HEADERS = {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type": "application/json"
    };

    function showOk(text) {
      msgErr.style.display = "none";
      msgOk.style.display = "block";
      msgOk.textContent = text;
    }

    function showErr(text) {
      msgOk.style.display = "none";
      msgErr.style.display = "block";
      msgErr.textContent = text;
    }

    async function readErrorText(res) {
      try {
        const txt = await res.text();
        return txt || ("HTTP " + res.status);
      } catch {
        return "HTTP " + res.status;
      }
    }

    btnGuardar.addEventListener("click", async () => {
      const nombreVal = nombre.value.trim();
      const celularVal = celular.value.trim();
      const correoVal = correo.value.trim();

      if (!nombreVal || !celularVal) {
        showErr("Completa nombre y celular.");
        return;
      }

      btnGuardar.disabled = true;
      msgOk.style.display = "none";
      msgErr.style.display = "none";

      try {
        const checkRes = await fetch(
          SUPABASE_URL +
            "/rest/v1/customers?select=id&celular=eq." +
            encodeURIComponent(celularVal),
          {
            headers: BASE_HEADERS
          }
        );

        if (!checkRes.ok) {
          const errText = await readErrorText(checkRes);
          console.error("Error validando celular:", errText);
          showErr("Error al validar celular: " + errText);
          return;
        }

        const existingRows = await checkRes.json();

        if (Array.isArray(existingRows) && existingRows.length > 0) {
          showErr("Ese celular ya está registrado.");
          return;
        }

        const customerRes = await fetch(
          SUPABASE_URL + "/rest/v1/customers",
          {
            method: "POST",
            headers: {
              ...BASE_HEADERS,
              "Prefer": "return=representation"
            },
            body: JSON.stringify([{
              nombre: nombreVal,
              celular: celularVal,
              correo: correoVal || null
            }])
          }
        );

        if (!customerRes.ok) {
          const errText = await readErrorText(customerRes);
          console.error("Error creando cliente:", errText);
          showErr("Error al registrar cliente: " + errText);
          return;
        }

        const customerRows = await customerRes.json();
        const customer = customerRows && customerRows[0];

        if (!customer || !customer.id) {
          showErr("Cliente creado sin ID válido.");
          return;
        }

        const cardRes = await fetch(
          SUPABASE_URL + "/rest/v1/loyalty_cards",
          {
            method: "POST",
            headers: BASE_HEADERS,
            body: JSON.stringify([{
              customer_id: customer.id,
              sellos_actuales: 0,
              meta_sellos: 10,
              premio_pendiente: false
            }])
          }
        );

        if (!cardRes.ok) {
          const errText = await readErrorText(cardRes);
          console.error("Error creando tarjeta:", errText);
          showErr("Cliente creado, pero falló la tarjeta: " + errText);
          return;
        }

        showOk("Registro exitoso. Tu tarjeta virtual fue creada.");
        nombre.value = "";
        celular.value = "";
        correo.value = "";
      } catch (err) {
        console.error(err);
        showErr("Error inesperado: " + (err.message || String(err)));
      } finally {
        btnGuardar.disabled = false;
      }
    });
  </script>
</body>
</html>
