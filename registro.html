<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de cliente - El Patrón del Mal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000814;
      color: #fff8dc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #001233;
      border: 1px solid #facc15;
      border-radius: 22px;
      padding: 26px;
      box-shadow: 0 0 25px rgba(250, 204, 21, 0.18);
      box-sizing: border-box;
    }

    .brand {
      text-align: center;
      margin-bottom: 22px;
    }

    .brand-logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #facc15;
      margin-bottom: 12px;
      background: #000;
      box-shadow: 0 0 12px rgba(250, 204, 21, 0.35);
    }

    @keyframes goldGlow {
      0% {
        color: #facc15;
        text-shadow: 0 0 4px #facc15, 0 0 8px rgba(250, 204, 21, 0.45);
      }
      50% {
        color: #ffe58a;
        text-shadow:
          0 0 6px #ffe58a,
          0 0 14px rgba(250, 204, 21, 0.7),
          0 0 22px rgba(250, 204, 21, 0.45);
      }
      100% {
        color: #facc15;
        text-shadow: 0 0 4px #facc15, 0 0 8px rgba(250, 204, 21, 0.45);
      }
    }

    .brand h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
      color: #facc15;
      animation: goldGlow 2.2s ease-in-out infinite;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .brand p {
      margin: 0;
      color: #d1d5db;
      font-size: 15px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: #fde68a;
      font-weight: 700;
      font-size: 15px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #000;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #facc15;
      box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.15);
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      border: 0;
      border-radius: 14px;
      background: #facc15;
      color: #111827;
      font-weight: 900;
      font-size: 17px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    .ok {
      background: #052e16;
      color: #bbf7d0;
      border: 1px solid #16a34a;
    }

    .err {
      background: #450a0a;
      color: #fecaca;
      border: 1px solid #dc2626;
    }

    .mini {
      margin-top: 14px;
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
    }

    .link-login {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
    }

    .link-login a {
      color: #facc15;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="LOGO.jpg" alt="El Patrón del Mal" class="brand-logo">
      <h1>EL PATRÓN DEL MAL</h1>
      <p>Tarjeta virtual de sellos y premios</p>
    </div>

    <label for="nombre">Nombre</label>
    <input id="nombre" type="text" placeholder="Tu nombre">

    <label for="celular">Celular</label>
    <input id="celular" type="text" placeholder="Tu número">

    <label for="password">Contraseña</label>
    <input id="password" type="password" placeholder="Tu contraseña">

    <button id="btnGuardar">Registrarme</button>

    <div id="msgOk" class="msg ok"></div>
    <div id="msgErr" class="msg err"></div>

    <div class="mini">
      Regístrate para acumular sellos y reclamar premios.
    </div>

    <div class="link-login">
      ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a>
    </div>
  </div>

  <script>
    const nombre = document.getElementById("nombre");
    const celular = document.getElementById("celular");
    const password = document.getElementById("password");
    const btnGuardar = document.getElementById("btnGuardar");
    const msgOk = document.getElementById("msgOk");
    const msgErr = document.getElementById("msgErr");

    function showOk(text) {
      msgErr.style.display = "none";
      msgOk.style.display = "block";
      msgOk.textContent = text;
    }

    function showErr(text) {
      msgOk.style.display = "none";
      msgErr.style.display = "block";
      msgErr.textContent = text;
    }

    btnGuardar.addEventListener("click", async () => {
      const nombreVal = nombre.value.trim();
      const celularVal = celular.value.replace(/\D/g, "").trim();
      const passwordVal = password.value.trim();

      if (!nombreVal || !celularVal || !passwordVal) {
        showErr("Completa nombre, celular y contraseña.");
        return;
      }

      btnGuardar.disabled = true;
      msgOk.style.display = "none";
      msgErr.style.display = "none";

      try {
        const res = await fetch("/api/register-customer", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            nombre: nombreVal,
            celular: celularVal,
            password: passwordVal
          })
        });

        const data = await res.json();

        if (!res.ok) {
          showErr(data.error + (data.detail ? ": " + data.detail : ""));
          return;
        }

        showOk("Registro exitoso. Ahora inicia sesión...");
        setTimeout(() => {
          window.location.href = "/login.html";
        }, 1200);

      } catch (err) {
        console.error(err);
        showErr("Error inesperado: " + (err.message || String(err)));
      } finally {
        btnGuardar.disabled = false;
      }
    });
  </script>
</body>
</html>
